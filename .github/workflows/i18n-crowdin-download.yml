name: i18n Crowdin Download

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download translations from Crowdin
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yml
          upload_sources: false
          upload_translations: false
          download_translations: true
          localization_branch_name: crowdin-translations
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Apply downloaded JSON to translations.ts
        run: node scripts/i18n/apply-crowdin-to-translations.mjs

      - name: Create translation sync PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/crowdin-translation-sync
          title: "chore(i18n): sync translations from Crowdin"
          commit-message: "chore(i18n): sync translations from Crowdin"
          body: |
            Automated translation sync from Crowdin.

            - Downloaded locale JSON via `crowdin.yml`
            - Applied JSON updates to `packages/shared/src/i18n/translations.ts`
          labels: |
            i18n
            automation
